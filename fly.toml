# fly.toml app configuration file generated for elevatedsolutions-app on 2026-03-24T21:19:22-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'elevatedsolutions-app'
primary_region = 'iad'

[build]
  [build.settings]
    deadline = 900

[env]
  DATA_DIR = "/data"

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
